<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Tổng hợp Kinh doanh</title>
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 32px auto 0 auto;
      background: #fff;
      border-radius: 10px;
      padding: 28px 18px 18px 18px;
      box-shadow: none;
    }
    h2 {
      text-align: center;
      color: #222;
      text-transform: uppercase;
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px 14px;
      margin-bottom: 22px;
      background: #fafbfc;
      border-radius: 8px;
      padding: 12px 8px 8px 8px;
      box-shadow: none;
    }
    .filter select, .filter input, .filter button {
      padding: 8px 12px;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      outline: none;
      background: #fff;
      color: #222;
      min-width: 100px;
      margin: 0;
      box-shadow: none;
      transition: border 0.2s;
    }
    .filter select:focus, .filter input:focus {
      border-color: #bdbdbd;
    }
    .filter button {
      background: #222;
      color: #fff;
      font-weight: 500;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .filter button:hover {
      background: #444;
    }
    #staffSelect {
      display: none;
    }
    .table-container {
      max-height: 520px;
      overflow-y: auto;
      border-radius: 8px;
      background: #fff;
      margin-top: 4px;
      box-shadow: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 6px;
      text-align: center;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fafbfc;
      color: #222;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 1.5px solid #e0e0e0;
    }
    td {
      border-bottom: 1px solid #f1f1f1;
      font-size: 0.97rem;
    }
    .highlight {
      background-color: #f7f7f7;
      border-radius: 4px;
      font-weight: 500;
      color: #333;
      border: none;
    }
    .product-name {
      font-weight: 600;
      background: #f5f5f5;
      color: #222;
      border-radius: 6px 0 0 6px;
    }
    .detail-name {
      font-weight: 500;
      color: #444;
    }
    .loading {
      text-align: center;
      margin-top: 18px;
      font-style: italic;
      color: #bdbdbd;
    }
    @media (max-width: 900px) {
      .container {
        padding: 8px 2vw 8px 2vw;
      }
      .filter {
        flex-direction: column;
        gap: 8px 0;
        padding: 8px 2px 6px 2px;
      }
      th, td {
        padding: 7px 2px;
        font-size: 0.95rem;
      }
    }
    @media (max-width: 600px) {
      .container {
        padding: 2px 0 2px 0;
      }
      h2 {
        font-size: 1.1rem;
      }
      .filter {
        padding: 4px 1px 2px 1px;
      }
      .table-container {
        max-height: 300px;
      }
    }
  </style>
</head>
<body>
  <h2>REPORT TỔNG HỢP KINH DOANH</h2>

  <div class="filter">
    <select id="mode" onchange="toggleInput()">
      <option value="date">Theo ngày</option>
      <option value="week">Theo tuần</option>
      <option value="month">Theo tháng</option>
      <option value="year">Theo năm</option>
    </select>
    <input type="date" id="dateInput" required>
    <div id="weekSelection" style="display:none">
      <select id="monthSelect" required>
        <option value="1">Tháng 1</option>
        <option value="2">Tháng 2</option>
        <option value="3">Tháng 3</option>
        <option value="4">Tháng 4</option>
        <option value="5">Tháng 5</option>
        <option value="6">Tháng 6</option>
        <option value="7">Tháng 7</option>
        <option value="8">Tháng 8</option>
        <option value="9">Tháng 9</option>
        <option value="10">Tháng 10</option>
        <option value="11">Tháng 11</option>
        <option value="12">Tháng 12</option>
      </select>
      <select id="weekSelect" required>
        <option value="1">Tuần 1</option>
        <option value="2">Tuần 2</option>
        <option value="3">Tuần 3</option>
        <option value="4">Tuần 4</option>
        <option value="5">Tuần 5</option>
      </select>
    </div>
    <input type="month" id="monthInput" required style="display:none">
    <input type="number" id="yearInput" placeholder="Năm" required style="display:none">

    <select id="viewMode" onchange="toggleStaffSelect()">
      <option value="all">Toàn chi nhánh</option>
      <option value="staff">Từng nhân viên</option>
    </select>

    <select id="staffSelect">
      <option disabled selected>-- Chọn nhân viên --</option>
    <option>KSV1</option>
    <option>GDV1</option>
    <option>SRM1</option>
    <option>Trưởng phòng tín dụng</option>
    <option>Tín dụng 1</option>
    <option>Tín dụng 2</option>
    <option>Tín dụng 3</option>
    <option>Tín dụng 4</option>
    </select>

    <button onclick="loadData()">Xem</button>
  </div>

  <div class="table-container">
    <table id="reportTable">
      <thead>
        <tr>
          <th>Sản phẩm</th>
          <th>Chi tiết sản phẩm</th>
          <th>Báo cáo đầu ngày</th>
          <th>Báo cáo cuối ngày</th>
          <th>Đánh giá</th>
        </tr>
      </thead>
      <tbody id="reportBody">
        <tr><td colspan="5" class="loading">Chưa có dữ liệu...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const productOrder = ["FD", "Bond", "Casa", "CCQ", "Lending", "Thẻ tín dụng", "NFI", "TKMM"];

    function toggleInput() {
      const mode = document.getElementById("mode").value;
      document.getElementById("dateInput").style.display = mode === "date" ? "inline-block" : "none";
      document.getElementById("weekSelection").style.display = mode === "week" ? "inline-block" : "none";
      document.getElementById("monthInput").style.display = mode === "month" ? "inline-block" : "none";
      document.getElementById("yearInput").style.display = mode === "year" ? "inline-block" : "none";
    }

    function toggleStaffSelect() {
      const viewMode = document.getElementById("viewMode").value;
      document.getElementById("staffSelect").style.display = viewMode === "staff" ? "inline-block" : "none";
    }

    function formatNumber(val) {
      if (!val || isNaN(val)) return val;
      return Number(val).toLocaleString('vi-VN');
    }

    function loadData() {
      const mode = document.getElementById("mode").value;
      let param = {};
      
      if (mode === "date") {
        const dateInput = document.getElementById("dateInput");
        if (!dateInput.value) {
          alert("Vui lòng chọn ngày!");
          return;
        }
        param.date = dateInput.value;
      }
      else if (mode === "week") {
        const month = document.getElementById("monthSelect").value;
        const week = document.getElementById("weekSelect").value;
        if (!month || !week) {
          alert("Vui lòng chọn đầy đủ tháng và tuần!");
          return;
        }
        param.month = parseInt(month);
        param.week = parseInt(week);
      }
      else if (mode === "month") {
        const monthInput = document.getElementById("monthInput");
        if (!monthInput.value) {
          alert("Vui lòng chọn tháng!");
          return;
        }
        param.date = monthInput.value + "-01";
      }
      else if (mode === "year") {
        const yearInput = document.getElementById("yearInput");
        if (!yearInput.value) {
          alert("Vui lòng nhập năm!");
          return;
        }
        const year = parseInt(yearInput.value);
        if (isNaN(year) || year < 2000 || year > 2100) {
          alert("Vui lòng nhập năm hợp lệ (từ 2000 đến 2100)!");
          return;
        }
        param.year = year;
      }

      const viewMode = document.getElementById("viewMode").value;
      if (viewMode === "staff") {
        param.staff = document.getElementById("staffSelect").value;
      }

      const body = document.getElementById("reportBody");
      body.innerHTML = '<tr><td colspan="5" class="loading">Đang tải dữ liệu...</td></tr>';
      google.script.run.withSuccessHandler(renderReport).getSummaryReportByDate(mode, param);
    }

    function renderReport(data) {
      const body = document.getElementById('reportBody');
      body.innerHTML = '';

      if (!data || !data.length) {
        body.innerHTML = '<tr><td colspan="5">Không có dữ liệu phù hợp</td></tr>';
        return;
      }

      const grouped = {};
      data.forEach(row => {
        if (!row.product || !row.detail) return;
        if (!grouped[row.product]) grouped[row.product] = [];
        grouped[row.product].push(row);
      });

      Object.keys(grouped)
        .sort((a, b) => productOrder.indexOf(a) - productOrder.indexOf(b))
        .forEach(product => {
          const rows = grouped[product];
          rows.forEach((row, index) => {
            const tr = document.createElement('tr');
            
            // Tính toán kết quả đánh giá
            const beginValue = parseFloat(row.begin) || 0;
            const endValue = parseFloat(row.end) || 0;
            const result = beginValue <= endValue ? 'Đạt' : 'Không đạt';
            const resultColor = result === 'Đạt' ? 'green' : 'red';

            tr.innerHTML = `
              ${index === 0 ? `<td class="product-name" rowspan="${rows.length}">${product}</td>` : ''}
              <td class="detail-name">${row.detail}</td>
              <td class="${beginValue > 0 ? 'highlight' : ''}">${formatNumber(beginValue)}</td>
              <td class="${endValue > 0 ? 'highlight' : ''}">${formatNumber(endValue)}</td>
              <td style="color:${resultColor}; font-weight:bold">${result}</td>
            `;
            body.appendChild(tr);
          });
        });
    }

    // Set current month and year as default
    document.addEventListener("DOMContentLoaded", function() {
      const currentDate = new Date();
      const currentMonth = currentDate.getMonth() + 1;
      const currentYear = currentDate.getFullYear();
      
      document.getElementById("monthSelect").value = currentMonth;
      document.getElementById("monthInput").value = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      document.getElementById("yearInput").value = currentYear;
    });
  </script>
</body>
</html>
