<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo KPI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1100px;
      margin: 32px auto 0 auto;
      background: #fff;
      border-radius: 10px;
      padding: 28px 18px 18px 18px;
    }
    h2 {
      text-align: center;
      color: #1976d2;
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .table-container {
      max-height: 520px;
      overflow-y: auto;
      border-radius: 8px;
      background: #fff;
      margin-top: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 6px;
      text-align: center;
    }
    thead th {
      background: #fafbfc;
      color: #222;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 1.5px solid #e0e0e0;
    }
    td {
      border-bottom: 1px solid #f1f1f1;
      font-size: 0.97rem;
    }
    /* Highlight row on hover */
    #kpiTable tbody tr:hover {
      background: #f5f5f5;
    }
    /* Conditional formatting classes */
    .cell-red {
      background: #e53935 !important;
      color: #ffe082 !important;
      font-weight: 600;
    }
    .cell-yellow {
      background: #fff000 !important;
      color: #222 !important;
      font-weight: 600;
    }
    .cell-green {
      background: #43a047 !important;
      color: #fff !important;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      margin-top: 18px;
      font-style: italic;
      color: #bdbdbd;
    }
    /* Minimal noUiSlider custom style */
    #monthRangeSlider {
      margin: 0 0 0 0;
      height: 28px;
      width: 130px;
    }
    .noUi-target {
      box-shadow: none;
      border: none;
      background: #e0e0e0;
      height: 4px;
      border-radius: 3px;
    }
    .noUi-connect {
      background: #1976d2;
      box-shadow: none;
    }
    .noUi-horizontal .noUi-handle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #1976d2;
      box-shadow: none;
      top: -7px;
      cursor: pointer;
      transition: border 0.2s;
    }
    .noUi-horizontal .noUi-handle:focus {
      outline: none;
      border: 2px solid #1565c0;
    }
    .noUi-handle:after, .noUi-handle:before {
      display: none;
    }
    .noUi-tooltip {
      display: none !important;
    }
    #rangeLabel {
      font-weight: 600;
      margin-left: 12px;
      color: #1976d2;
      font-size: 1.08rem;
    }
    @media (max-width: 900px) {
      .container {
        padding: 8px 2vw 8px 2vw;
      }
      th, td {
        padding: 7px 2px;
        font-size: 0.95rem;
      }
    }
    @media (max-width: 600px) {
      .container {
        padding: 2px 0 2px 0;
      }
      h2 {
        font-size: 1.1rem;
      }
      .table-container {
        max-height: 300px;
      }
      #monthRangeSlider {
        width: 90vw !important;
        max-width: 130px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>Báo cáo KPI</h2>
    <div style="margin-bottom: 18px; text-align: center;">
      <label style="font-weight: 500; margin-right: 10px;">Chọn khoảng tháng:</label>
      <div id="monthRangeSlider" style="display: inline-block; width: 260px; vertical-align: middle;"></div>
      <span id="rangeLabel" style="font-weight: 600; margin-left: 12px;">1 - 12</span>
    </div>
    <div class="table-container">
      <table id="kpiTable">
        <thead>
          <tr>
            <th>Nhân viên</th>
            <th class="month-col" data-month="1">Tháng 1</th>
            <th class="month-col" data-month="2">Tháng 2</th>
            <th class="month-col" data-month="3">Tháng 3</th>
            <th class="month-col" data-month="4">Tháng 4</th>
            <th class="month-col" data-month="5">Tháng 5</th>
            <th class="month-col" data-month="6">Tháng 6</th>
            <th class="month-col" data-month="7">Tháng 7</th>
            <th class="month-col" data-month="8">Tháng 8</th>
            <th class="month-col" data-month="9">Tháng 9</th>
            <th class="month-col" data-month="10">Tháng 10</th>
            <th class="month-col" data-month="11">Tháng 11</th>
            <th class="month-col" data-month="12">Tháng 12</th>
            <th class="avg-col">Trung bình kỳ</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>KSV1</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>GDV1</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>SRM1</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>Trưởng phòng tín dụng</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>Tín dụng 1</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>Tín dụng 2</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>Tín dụng 3</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><td>Tín dụng 4</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    // Gọi dữ liệu KPI từ backend
    function fetchKPIData() {
      return new Promise((resolve, reject) => {
        google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getKPIData();
      });
    }

    // Render bảng theo dữ liệu động
    function renderKPITable(data) {
      const tbody = document.querySelector('#kpiTable tbody');
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        // Tên nhân viên
        const tdName = document.createElement('td');
        tdName.textContent = row.name;
        tr.appendChild(tdName);
        // 12 tháng
        for (let i = 0; i < 12; i++) {
          const td = document.createElement('td');
          const val = row.months[i];
          if (typeof val === 'number' && !isNaN(val)) {
            let percent = (val * 100).toFixed(2);
            percent = percent.endsWith('.00') ? parseInt(percent) : percent.replace(/(\.[1-9]*)0+$/, '$1').replace(/\.$/, '');
            td.textContent = percent + '%';
            // Conditional formatting
            if (percent < 50) {
              td.classList.add('cell-red');
            } else if (percent < 80) {
              td.classList.add('cell-yellow');
            } else {
              td.classList.add('cell-green');
            }
          } else {
            td.textContent = '';
          }
          tr.appendChild(td);
        }
        // Trung bình kỳ (ban đầu: mặc định tháng 1-6)
        const tdAvg = document.createElement('td');
        tdAvg.className = 'avg-col';
        tdAvg.setAttribute('data-row', row.name);
        tr.appendChild(tdAvg);
        tbody.appendChild(tr);
      });
    }

    // Tính lại trung bình kỳ cho từng dòng theo slider
    function updateAvgColByRange(start, end) {
      const tbody = document.querySelector('#kpiTable tbody');
      tbody.querySelectorAll('tr').forEach((tr, rowIdx) => {
        // Lấy các ô tháng hiển thị
        const tds = tr.querySelectorAll('td');
        let sum = 0, count = 0;
        for (let i = start; i <= end; i++) {
          const td = tds[i];
          const valText = td.textContent.replace('%','');
          const val = parseFloat(valText);
          if (!isNaN(val)) {
            sum += val;
            count++;
          }
        }
        const avgTd = tds[13];
        // Xóa class cũ nếu có
        avgTd.classList.remove('cell-red', 'cell-yellow', 'cell-green');
        if (count) {
          let avg = (sum / count).toFixed(2);
          avg = avg.endsWith('.00') ? parseInt(avg) : avg.replace(/(\.[1-9]*)0+$/, '$1').replace(/\.$/, '');
          avgTd.textContent = avg + '%';
          // Conditional formatting cho cột trung bình kỳ
          if (avg < 50) {
            avgTd.classList.add('cell-red');
          } else if (avg < 80) {
            avgTd.classList.add('cell-yellow');
          } else {
            avgTd.classList.add('cell-green');
          }
        } else {
          avgTd.textContent = '';
        }
      });
    }

    // Slider và logic lọc cột giữ nguyên
    var monthSlider = document.getElementById('monthRangeSlider');
    noUiSlider.create(monthSlider, {
      start: [1, 6],
      connect: true,
      step: 1,
      range: {
        'min': 1,
        'max': 12
      },
      tooltips: false,
      format: {
        to: function (value) { return Math.round(value); },
        from: function (value) { return Number(value); }
      }
    });
    var rangeLabel = document.getElementById('rangeLabel');
    var table = document.getElementById('kpiTable');
    function updateTableByRange(start, end) {
      const allMonthCols = table.querySelectorAll('.month-col');
      const avgCols = table.querySelectorAll('.avg-col');
      allMonthCols.forEach(col => {
        const m = parseInt(col.getAttribute('data-month'));
        if (m >= start && m <= end) {
          col.style.display = '';
        } else {
          col.style.display = 'none';
        }
      });
      avgCols.forEach(col => col.style.display = '');
      table.querySelectorAll('tbody tr').forEach(row => {
        row.querySelectorAll('td').forEach((td, idx) => {
          if (idx === 0 || idx === 13) {
            td.style.display = '';
          } else if (idx >= start && idx <= end) {
            td.style.display = '';
          } else {
            td.style.display = 'none';
          }
        });
      });
      rangeLabel.textContent = 'Tháng ' + start + ' - Tháng ' + end;
      updateAvgColByRange(start, end);
    }
    monthSlider.noUiSlider.on('update', function(values) {
      var start = parseInt(values[0]);
      var end = parseInt(values[1]);
      updateTableByRange(start, end);
    });

    // Khi trang load: lấy dữ liệu và render bảng
    fetchKPIData().then(renderKPITable).then(() => {
      updateTableByRange(1, 6);
    });
  </script>
</body>
</html>
