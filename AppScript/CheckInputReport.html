<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #fff6f0 0%, #ffe5d0 100%);
      padding: 0;
      margin: 0;
      min-height: 100vh;
      color: #222;
    }
    .container {
      max-width: 600px;
      margin: 32px auto;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(216,65,25,0.08);
      padding: 32px 24px 24px 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      justify-content: center;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: #fff0e6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(216,65,25,0.08);
    }
    .header-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #d84119;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .filter-card {
      background: #fff7f2;
      border-radius: 12px;
      padding: 18px 16px 10px 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(216,65,25,0.04);
    }
    .filter-label {
      font-weight: 500;
      color: #d84119;
      margin-right: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-date {
      border: 1px solid #ffd6c2;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }
    .filter-date:focus {
      border: 1.5px solid #d84119;
    }
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(216,65,25,0.04);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
      background: transparent;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #d84119;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 1rem;
      letter-spacing: 0.5px;
      z-index: 2;
    }
    th, td {
      padding: 13px 10px;
      text-align: center;
      border-bottom: 1px solid #ffe5d0;
      font-size: 1rem;
    }
    tbody tr:hover {
      background: #fff3e6;
      transition: background 0.2s;
    }
    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f7f7f7;
      box-shadow: 0 1px 3px rgba(216,65,25,0.04);
      cursor: pointer;
      position: relative;
    }
    .status-icon[data-tooltip]:hover:after {
      /* Tooltip sẽ được xử lý bằng JS, không dùng CSS này nữa */
    }
    .status-success {
      background: #e6fbe6;
      color: #1db954;
    }
    .status-warning {
      background: #fffbe6;
      color: #ffb300;
    }
    .status-error {
      background: #ffeaea;
      color: #e53935;
    }
    .loading {
      text-align: center;
      padding: 32px 0;
      color: #d84119;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .switch-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .switch-btn {
      background: #fff7f2;
      color: #d84119;
      border: 2px solid #ffd6c2;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .switch-btn.active, .switch-btn:hover {
      background: #d84119;
      color: #fff;
      border-color: #d84119;
    }
    .switch-icon {
      font-size: 1.2em;
    }
    @media (max-width: 700px) {
      .container { padding: 10px 2px; }
      .header-title { font-size: 1.1rem; }
      .filter-card { flex-direction: column; align-items: flex-start; gap: 8px; }
      table { min-width: 340px; font-size: 0.95rem; }
      th, td { padding: 8px 4px; }
    }
  </style>
  <script>
    function svgIcon(type) {
      if (type === 'success') return `<svg width='20' height='20' fill='none' viewBox='0 0 20 20'><circle cx='10' cy='10' r='10' fill='#1db954'/><path d='M6 10.5l2.5 2.5 5-5' stroke='#fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>`;
      if (type === 'error') return `<svg width='20' height='20' fill='none' viewBox='0 0 20 20'><circle cx='10' cy='10' r='10' fill='#e53935'/><path d='M7 7l6 6M13 7l-6 6' stroke='#fff' stroke-width='2' stroke-linecap='round'/></svg>`;
      if (type === 'warning') return `<svg width='20' height='20' fill='none' viewBox='0 0 20 20'><circle cx='10' cy='10' r='10' fill='#ffb300'/><path d='M10 5v6M10 15h.01' stroke='#fff' stroke-width='2' stroke-linecap='round'/></svg>`;
      return '';
    }
    function loadReport() {
      const date = document.getElementById("date").value;
      if (!date) return;
      document.getElementById("reportBody").innerHTML = `<tr><td colspan='4'><div class='loading'>Đang tải dữ liệu...</div></td></tr>`;
      google.script.run.withSuccessHandler(renderReport).getCheckReportData("day", { date });
    }
    function renderReport(data) {
      const body = data.map(row => {
        let summaryType, summaryTip;
        if (row.am && row.pm) {
          summaryType = 'success'; summaryTip = 'Đã nhập đủ báo cáo kế hoạch và kết quả';
        } else if (!row.am && !row.pm) {
          summaryType = 'error'; summaryTip = 'Chưa nhập báo cáo nào';
        } else {
          summaryType = 'warning'; summaryTip = 'Mới nhập 1 loại báo cáo';
        }
        return `
          <tr>
            <td style="font-weight:500;">${row.name}</td>
            <td><span class="status-icon ${row.am ? 'status-success' : 'status-error'}" data-tooltip="${row.am ? 'Đã nhập BC kế hoạch' : 'Chưa nhập BC kế hoạch'}">${svgIcon(row.am ? 'success' : 'error')}</span></td>
            <td><span class="status-icon ${row.pm ? 'status-success' : 'status-error'}" data-tooltip="${row.pm ? 'Đã nhập BC kết quả' : 'Chưa nhập BC kết quả'}">${svgIcon(row.pm ? 'success' : 'error')}</span></td>
            <td><span class="status-icon status-${summaryType}" data-tooltip="${summaryTip}">${svgIcon(summaryType)}</span></td>
          </tr>
        `;
      }).join("");
      document.getElementById("reportBody").innerHTML = body;
    }
    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("date").value = today;
      loadReport();

      // Tooltip auto direction
      document.body.addEventListener('mouseover', function(e) {
        const icon = e.target.closest('.status-icon[data-tooltip]');
        if (!icon) return;
        // Xóa tooltip cũ nếu có
        document.querySelectorAll('.custom-tooltip').forEach(el => el.remove());
        const tooltipText = icon.getAttribute('data-tooltip');
        if (!tooltipText) return;
        const tooltip = document.createElement('div');
        tooltip.className = 'custom-tooltip';
        tooltip.innerText = tooltipText;
        document.body.appendChild(tooltip);
        // Style cơ bản
        Object.assign(tooltip.style, {
          position: 'fixed',
          background: '#222',
          color: '#fff',
          fontSize: '0.95rem',
          padding: '7px 14px',
          borderRadius: '6px',
          whiteSpace: 'nowrap',
          zIndex: 9999,
          pointerEvents: 'none',
          boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
          opacity: 0,
          transition: 'opacity 0.15s',
        });
        // Định vị
        const rect = icon.getBoundingClientRect();
        const tRect = tooltip.getBoundingClientRect();
        // Ưu tiên trên, nếu không đủ thì dưới, phải, trái
        let top = rect.top - tRect.height - 8;
        let left = rect.left + rect.width/2 - tRect.width/2;
        let direction = 'top';
        if (top < 0) { // Không đủ trên, thử dưới
          top = rect.bottom + 8;
          direction = 'bottom';
        }
        if (left < 0) { // Không đủ trái, dịch phải
          left = rect.left;
          direction = 'right';
        }
        if (left + tRect.width > window.innerWidth) { // Không đủ phải, dịch trái
          left = rect.right - tRect.width;
          direction = 'left';
        }
        tooltip.style.top = `${top}px`;
        tooltip.style.left = `${left}px`;
        tooltip.style.opacity = 1;
      });
      document.body.addEventListener('mouseout', function(e) {
        if (e.target.closest('.status-icon[data-tooltip]')) {
          document.querySelectorAll('.custom-tooltip').forEach(el => el.remove());
        }
      });

      // --- SWITCH UI LOGIC ---
      const btnDaily = document.getElementById('switch-daily');
      const btnWeekly = document.getElementById('switch-weekly');
      const filterCard = document.querySelector('.filter-card');
      const tableWrap = document.querySelector('.table-wrap');
      let monthSelect = null;

      function renderWeeklyTableUI() {
        // Tạo select tháng nếu chưa có
        if (!monthSelect) {
          monthSelect = document.createElement('select');
          monthSelect.className = 'filter-date';
          monthSelect.id = 'month-select';
          for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = `Tháng ${m}`;
            monthSelect.appendChild(opt);
          }
          monthSelect.style.marginLeft = '8px';
        }
        filterCard.innerHTML = '';
        const label = document.createElement('label');
        label.className = 'filter-label';
        label.htmlFor = 'month-select';
        label.innerHTML = `<svg width="18" height="18" fill="none" viewBox="0 0 18 18"><rect x="2.5" y="4.5" width="13" height="11" rx="2" stroke="#d84119" stroke-width="1.5"/><path d="M6 2v2.5M12 2v2.5" stroke="#d84119" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 7.5h13" stroke="#d84119" stroke-width="1.5"/></svg> Chọn tháng:`;
        filterCard.appendChild(label);
        filterCard.appendChild(monthSelect);

        // Tự động chọn tháng hiện tại
        const now = new Date();
        monthSelect.value = now.getMonth() + 1;

        // Bảng mẫu (chỉ UI)
        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Họ và tên</th>
                <th>Tuần 1</th>
                <th>Tuần 2</th>
                <th>Tuần 3</th>
                <th>Tuần 4</th>
                <th>Tuần 5</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="6" style="text-align:center;color:#d84119;padding:32px 0;">Đang tải dữ liệu...</td></tr>
            </tbody>
          </table>
        `;

        // Gọi Apps Script lấy dữ liệu cam kết tuần
        loadWeeklyCommitTable(monthSelect.value);
        monthSelect.onchange = function() {
          tableWrap.querySelector('#reportBody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:#d84119;padding:32px 0;">Đang tải dữ liệu...</td></tr>`;
          loadWeeklyCommitTable(monthSelect.value);
        };
      }

      // Render bảng cam kết tuần với icon trạng thái
      function loadWeeklyCommitTable(month) {
        google.script.run.withSuccessHandler(renderWeeklyCheckTable).getWeeklyCommitCheck(month);
      }
      function renderWeeklyCheckTable(data) {
        const body = (data && data.length) ? data.map(row => {
          function iconCell(val) {
            return `<span class="status-icon ${val ? 'status-success' : 'status-error'}" data-tooltip="${val ? 'Đã nhập cam kết tuần' : 'Chưa nhập cam kết tuần'}">${svgIcon(val ? 'success' : 'error')}</span>`;
          }
          return `
            <tr>
              <td style="font-weight:500;">${row.name}</td>
              <td>${iconCell(row.week1)}</td>
              <td>${iconCell(row.week2)}</td>
              <td>${iconCell(row.week3)}</td>
              <td>${iconCell(row.week4)}</td>
              <td>${iconCell(row.week5)}</td>
            </tr>
          `;
        }).join("") : `<tr><td colspan="6" style="text-align:center;color:#d84119;padding:32px 0;">Không có dữ liệu cam kết tuần cho tháng này</td></tr>`;
        document.getElementById("reportBody").innerHTML = body;
      }

      function renderDailyTableUI() {
        // Khôi phục filter ngày
        filterCard.innerHTML = `
          <label class="filter-label" for="date">
            <svg width="18" height="18" fill="none" viewBox="0 0 18 18"><rect x="2.5" y="4.5" width="13" height="11" rx="2" stroke="#d84119" stroke-width="1.5"/><path d="M6 2v2.5M12 2v2.5" stroke="#d84119" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 7.5h13" stroke="#d84119" stroke-width="1.5"/></svg>
            Chọn ngày:
          </label>
          <input type="date" id="date" class="filter-date" onchange="loadReport()">
        `;
        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Họ và tên</th>
                <th>BC Kế hoạch</th>
                <th>BC Kết quả</th>
                <th>Tổng hợp</th>
              </tr>
            </thead>
            <tbody id="reportBody"></tbody>
          </table>
        `;
        // Gán lại giá trị ngày và load lại báo cáo ngày
        document.getElementById("date").value = today;
        loadReport();
      }

      btnWeekly.addEventListener('click', function() {
        btnWeekly.classList.add('active');
        btnDaily.classList.remove('active');
        renderWeeklyTableUI();
      });
      btnDaily.addEventListener('click', function() {
        btnDaily.classList.add('active');
        btnWeekly.classList.remove('active');
        renderDailyTableUI();
      });
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="header-icon">
        <svg width="28" height="28" fill="none" viewBox="0 0 28 28"><circle cx="14" cy="14" r="14" fill="#d84119"/><path d="M8 14.5l4 4 8-8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="header-title">Kiểm Tra Nhập Báo Cáo</span>
    </div>
    <div class="switch-bar">
      <button class="switch-btn active" id="switch-daily" title="Kiểm tra nhập báo cáo ngày">
        <span class="switch-icon">📋</span> Báo cáo ngày
      </button>
      <button class="switch-btn" id="switch-weekly" title="Kiểm tra nhập cam kết tuần">
        <span class="switch-icon">📝</span> Cam kết tuần
      </button>
    </div>
    <div class="filter-card">
      <label class="filter-label" for="date">
        <svg width="18" height="18" fill="none" viewBox="0 0 18 18"><rect x="2.5" y="4.5" width="13" height="11" rx="2" stroke="#d84119" stroke-width="1.5"/><path d="M6 2v2.5M12 2v2.5" stroke="#d84119" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 7.5h13" stroke="#d84119" stroke-width="1.5"/></svg>
        Chọn ngày:
      </label>
      <input type="date" id="date" class="filter-date" onchange="loadReport()">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Họ và tên</th>
            <th>BC Kế hoạch</th>
            <th>BC Kết quả</th>
            <th>Tổng hợp</th>
          </tr>
        </thead>
        <tbody id="reportBody"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
