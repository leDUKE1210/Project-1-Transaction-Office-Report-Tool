<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập liệu SCAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #f7f8fa 0%, #e3e9f7 100%);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(60,72,100,0.12);
            padding: 48px 5vw 40px 5vw;
            width: 100vw;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: box-shadow 0.2s;
        }
        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1a237e;
            font-size: 2.5rem;
            letter-spacing: 0.5px;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 1.2rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 28px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.08rem;
            color: #6b7280;
            font-weight: 500;
            letter-spacing: 0.1px;
        }
        textarea {
            width: 100%;
            min-height: 54px;
            max-height: 200px;
            resize: vertical;
            padding: 16px 18px;
            border: 1.5px solid #e0e7ef;
            border-radius: 12px;
            font-size: 1.18rem;
            font-family: inherit;
            background: #f5f7fa;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 1px 4px rgba(60,72,100,0.04);
        }
        textarea:focus {
            border: 1.5px solid #2563eb;
            outline: none;
            background: #fff;
            box-shadow: 0 2px 8px rgba(37,99,235,0.08);
        }
        button {
            width: 100%;
            padding: 18px 0;
            background: linear-gradient(90deg, #2563eb 0%, #4f8cff 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(37,99,235,0.10);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            margin-top: 18px;
        }
        button:hover {
            background: linear-gradient(90deg, #1d4ed8 0%, #2563eb 100%);
            box-shadow: 0 4px 16px rgba(37,99,235,0.13);
            transform: translateY(-2px) scale(1.01);
        }
        button[disabled] {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.08rem;
            color: #2563eb;
            margin-top: 18px;
        }
        .loading svg {
            width: 22px;
            height: 22px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        #message {
            min-height: 36px;
        }
        .success, .error {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1.08rem;
            margin-top: 18px;
            border-radius: 6px;
            padding: 10px 0;
        }
        .success {
            color: #15803d;
            background: #e7fbe9;
        }
        .error {
            color: #dc2626;
            background: #fdeaea;
        }
        .success svg, .error svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }
        @media (max-width: 700px) {
            .container {
                padding: 12px 2vw 12px 2vw;
                max-width: 100vw;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nhập dữ liệu khách hàng tiềm năng</h2>
        <div class="subtitle">Vui lòng nhập đầy đủ thông tin vào các trường bên dưới</div>
        <form id="scanForm">
            <div style="color: #dc2626; font-weight: bold; margin-bottom: 16px; text-align: center; font-size: 1.08rem;">
                *Bắt buộc: Nhập ít nhất 1 trong 2 trường <span style='text-decoration:underline'>CIF</span> hoặc <span style='text-decoration:underline'>Họ và Tên</span>*
            </div>
            <div class="form-group">
                <label for="cif">1. CIF</label>
                <textarea id="cif" name="cif"></textarea>
            </div>
            <div class="form-group">
                <label for="hoten">2. Họ và Tên</label>
                <textarea id="hoten" name="hoten"></textarea>
            </div>
            <div class="form-group">
                <label for="chuyenvien">3. Chuyên viên</label>
                <textarea id="chuyenvien" name="chuyenvien"></textarea>
            </div>
            <div class="form-group">
                <label for="thang">4. Tháng</label>
                <textarea id="thang" name="thang"></textarea>
            </div>
            <div class="form-group">
                <label for="tuan">5. Tuần</label>
                <textarea id="tuan" name="tuan"></textarea>
            </div>
            <div class="form-group">
                <label for="lead_trongtam">6. LEAD TRỌNG TÂM</label>
                <textarea id="lead_trongtam" name="lead_trongtam"></textarea>
            </div>
            <div class="form-group">
                <label for="trangthai">7. Trạng thái</label>
                <textarea id="trangthai" name="trangthai"></textarea>
            </div>
            <div class="form-group">
                <label for="ghichu_trangthai">8. Ghi chú trạng thái</label>
                <textarea id="ghichu_trangthai" name="ghichu_trangthai"></textarea>
            </div>
            <div class="form-group">
                <label for="nhankhau">9. Nhân khẩu học</label>
                <textarea id="nhankhau" name="nhankhau"></textarea>
            </div>
            <div class="form-group">
                <label for="taichinh">10. Tài chính</label>
                <textarea id="taichinh" name="taichinh"></textarea>
            </div>
            <div class="form-group">
                <label for="hanhvi_tc">11. Hành vi tài chính</label>
                <textarea id="hanhvi_tc" name="hanhvi_tc"></textarea>
            </div>
            <div class="form-group">
                <label for="hanhvi_cuocsong">12. Hành vi cuộc sống</label>
                <textarea id="hanhvi_cuocsong" name="hanhvi_cuocsong"></textarea>
            </div>
            <div class="form-group">
                <label for="du_dinh">13. Dự định</label>
                <textarea id="du_dinh" name="du_dinh"></textarea>
            </div>
            <div class="form-group">
                <label for="kichban">14. Kịch bản</label>
                <textarea id="kichban" name="kichban"></textarea>
            </div>
            <div class="form-group">
                <label for="taisao_mua">15. Tại sao nên mua?</label>
                <textarea id="taisao_mua" name="taisao_mua"></textarea>
            </div>
            <div class="form-group">
                <label for="case_size">16. Case size phù hợp?</label>
                <textarea id="case_size" name="case_size"></textarea>
            </div>
            <div class="form-group">
                <label for="laytien">17. Lấy tiền ở đâu</label>
                <textarea id="laytien" name="laytien"></textarea>
            </div>
            <div class="form-group">
                <label for="taisao_now">18. Tại sao nên quyết định bây giờ?</label>
                <textarea id="taisao_now" name="taisao_now"></textarea>
            </div>
            <div class="form-group">
                <label for="nextstep">19. Next step</label>
                <textarea id="nextstep" name="nextstep"></textarea>
            </div>
            <div class="form-group">
                <label for="ketqua">20. Kết quả/Dự kiến</label>
                <textarea id="ketqua" name="ketqua"></textarea>
            </div>
            <div class="form-group">
                <label for="ghichu">21. Ghi chú</label>
                <textarea id="ghichu" name="ghichu"></textarea>
            </div>
            <button type="submit">Gửi dữ liệu</button>
            <div id="message"></div>
        </form>
    </div>
    <script>
        const form = document.getElementById('scanForm');
        const btn = form.querySelector('button[type="submit"]');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            // Kiểm tra bắt buộc 1 trong 2 trường đầu tiên
            const cifValue = document.getElementById('cif').value.trim();
            const hotenValue = document.getElementById('hoten').value.trim();
            if (!cifValue && !hotenValue) {
                document.getElementById('message').innerHTML = '<div class="error"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#f87171"/><path d="M7 7l6 6M13 7l-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>Vui lòng nhập CIF hoặc Họ và Tên!</div>';
                return;
            }
            btn.disabled = true;
            document.getElementById('message').innerHTML = '<div class="loading"><svg viewBox="0 0 50 50" fill="none"><circle cx="25" cy="25" r="20" stroke="#2563eb" stroke-width="5" stroke-linecap="round" opacity="0.2"/><path d="M45 25a20 20 0 1 1-20-20" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/></svg>Đang gửi dữ liệu...</div>';
            var data = {
                cif: document.getElementById('cif').value,
                hoten: document.getElementById('hoten').value,
                chuyenvien: document.getElementById('chuyenvien').value,
                thang: document.getElementById('thang').value,
                tuan: document.getElementById('tuan').value,
                lead_trongtam: document.getElementById('lead_trongtam').value,
                trangthai: document.getElementById('trangthai').value,
                ghichu_trangthai: document.getElementById('ghichu_trangthai').value,
                nhankhau: document.getElementById('nhankhau').value,
                taichinh: document.getElementById('taichinh').value,
                hanhvi_tc: document.getElementById('hanhvi_tc').value,
                hanhvi_cuocsong: document.getElementById('hanhvi_cuocsong').value,
                du_dinh: document.getElementById('du_dinh').value,
                kichban: document.getElementById('kichban').value,
                taisao_mua: document.getElementById('taisao_mua').value,
                case_size: document.getElementById('case_size').value,
                laytien: document.getElementById('laytien').value,
                taisao_now: document.getElementById('taisao_now').value,
                nextstep: document.getElementById('nextstep').value,
                ketqua: document.getElementById('ketqua').value,
                ghichu: document.getElementById('ghichu').value
            };
            google.script.run
                .withSuccessHandler(function() {
                    document.getElementById('message').innerHTML = '<div class="success"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#22c55e"/><path d="M6 10.5l2.5 2.5 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Đã gửi dữ liệu thành công!</div>';
                    form.reset();
                    btn.disabled = false;
                })
                .withFailureHandler(function(error) {
                    document.getElementById('message').innerHTML = '<div class="error"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="#f87171"/><path d="M7 7l6 6M13 7l-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>Lỗi: ' + error.message + '</div>';
                    btn.disabled = false;
                })
                .submitSCANForm(data);
        });
    </script>
</body>
</html>
